services:
  db:
    image: postgres:15-alpine
    container_name: rakit-tiket-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: rakit-tiket-app
    restart: always
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./upload:/app/upload
    environment:
      CLIENT_ORIGIN_URL: ${CLIENT_ORIGIN_URL}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_DATABASE: ${DB_DATABASE}
      PORT: ${PORT}
      MIGRATION_PATH: /app/internal/pkg/scripts
      LOG_ENVIRONMENT: production
      APP_FILE_PATH: ${APP_FILE_PATH}
      FILE_PATH: ${FILE_PATH}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SENDER_NAME: ${SENDER_NAME}
      SENDER_EMAIL: ${SENDER_EMAIL}
      MIDTRANS_SERVER_KEY: ${MIDTRANS_SERVER_KEY}
      MIDTRANS_ENVIRONMENT: ${MIDTRANS_ENVIRONMENT}

  swagger-ui:
    image: swaggerapi/swagger-ui
    container_name: rakit-tiket-swagger
    ports:
      - "8081:8080"
    environment:
      SWAGGER_JSON: /docs/rakit-tiket.open-api.yaml
    volumes:
      - ./docs:/docs

volumes:
  pgdata: